<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Commonplace — Capture (M1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(96.5% 0.012 75);
    --surface: oklch(99% 0.004 75);
    --surface-2: oklch(93% 0.016 75);
    --border: oklch(87% 0.016 75);
    --text: oklch(27% 0.018 75);
    --text-muted: oklch(52% 0.015 75);
    --sage: oklch(56% 0.09 155);
    --sage-soft: oklch(91% 0.035 155);
    --warn: oklch(58% 0.11 70);
    --warn-soft: oklch(92% 0.045 70);
    --alert: oklch(55% 0.15 25);
    --alert-soft: oklch(93% 0.04 25);
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    max-width: 560px;
    margin: 0 auto;
    padding: 44px 24px;
  }
  h1 { font-family: 'Source Serif 4', serif; font-size: 28px; margin: 0 0 4px; }
  p.sub { color: var(--text-muted); margin: 0 0 28px; font-size: 14px; }
  form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  input[type=file], input[type=date] {
    font: inherit;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
  }
  button {
    font: inherit;
    font-weight: 600;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  #status { font-size: 13px; margin-top: 10px; color: var(--text-muted); }
  #entries { margin-top: 32px; display: flex; flex-direction: column; gap: 10px; }
  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }
  .entry-card .status {
    background: var(--sage-soft);
    color: var(--sage);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <h1>Capture</h1>
  <p class="sub">Photograph one or more pages and upload them — we transcribe each and read the date off the page automatically. You'll only be asked to confirm the date when it's unclear.</p>

  <form id="upload-form">
    <div>
      <label for="file">Page photo(s)</label><br />
      <input type="file" id="file" name="file" accept="image/*" capture="environment" multiple required />
    </div>
    <details>
      <summary style="cursor:pointer;font-size:13px;color:var(--text-muted)">Set date manually (optional)</summary>
      <div style="margin-top:8px">
        <input type="date" id="written_date" name="written_date" />
      </div>
    </details>
    <button type="submit">Upload</button>
    <div id="status"></div>
  </form>

  <div id="entries"></div>

<script>
  const form = document.getElementById('upload-form');
  const statusEl = document.getElementById('status');
  const entriesEl = document.getElementById('entries');

  const esc = (s) => String(s).replace(/[&<>"]/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function entryCard(e) {
    if (e.status === 'error') {
      // Show why OCR failed instead of a bare "error" pill.
      const detail = e.error_detail || 'Transcription failed.';
      return `
        <div class="entry-card" style="flex-direction:column;align-items:stretch;gap:6px;border-color:var(--alert)">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
            <span>${e.written_date} — ${e.image_count} image(s)</span>
            <span class="status" style="background:var(--alert-soft);color:var(--alert)">error</span>
          </div>
          <div style="font-size:12px;color:var(--alert);word-break:break-word">${esc(detail)}</div>
        </div>`;
    }
    if (e.needs_date_review) {
      // OCR wasn't confident about the date — ask for a quick confirmation,
      // prefilled with its best guess (or capture date as a fallback).
      const guess = e.detected_date || e.written_date;
      return `
        <div class="entry-card" style="flex-direction:column;align-items:stretch;gap:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span>Couldn't read the date confidently — please confirm</span>
            <span class="status" style="background:var(--warn-soft);color:var(--warn)">check date</span>
          </div>
          <div style="display:flex;gap:8px">
            <input type="date" value="${guess}" data-entry="${e.id}" style="flex:1" />
            <button type="button" data-confirm="${e.id}" style="padding:8px 14px">Confirm</button>
          </div>
        </div>`;
    }
    // Mood pill (populated by the sentiment pass once transcription lands).
    const mood = e.mood
      ? `<span class="status" style="background:var(--surface-2);color:var(--text-muted)">${esc(e.mood)}</span>`
      : '';
    return `
      <div class="entry-card">
        <span>${e.written_date} — ${e.image_count} image(s)</span>
        <span style="display:flex;gap:6px;align-items:center">${mood}<span class="status">${e.status}</span></span>
      </div>`;
  }

  async function loadEntries() {
    const res = await fetch('/entries');
    const entries = await res.json();
    entriesEl.innerHTML = entries.map(entryCard).join('');
  }

  entriesEl.addEventListener('click', async (ev) => {
    const id = ev.target.getAttribute('data-confirm');
    if (!id) return;
    const input = entriesEl.querySelector(`input[data-entry="${id}"]`);
    if (!input.value) return;
    ev.target.disabled = true;
    await fetch(`/entries/${id}/date`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ written_date: input.value }),
    });
    loadEntries();
  });

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const button = form.querySelector('button');
    const files = Array.from(document.getElementById('file').files);
    if (!files.length) return;
    const manualDate = document.getElementById('written_date').value;

    button.disabled = true;
    let done = 0;
    const failures = [];

    for (const file of files) {
      done++;
      statusEl.textContent = files.length > 1
        ? `Uploading ${done}/${files.length}…`
        : 'Uploading…';
      const fd = new FormData();
      fd.append('file', file);
      if (manualDate) fd.append('written_date', manualDate);
      try {
        const res = await fetch('/entries/upload', { method: 'POST', body: fd });
        if (!res.ok) throw new Error(await res.text());
        loadEntries(); // reflect each new entry as it lands
      } catch (err) {
        failures.push(`${file.name}: ${err.message}`);
      }
    }

    const ok = files.length - failures.length;
    statusEl.textContent = failures.length
      ? `Uploaded ${ok}/${files.length} — transcribing. Failed: ${failures.join('; ')}`
      : `Uploaded ${ok} ${ok === 1 ? 'page' : 'pages'} — transcribing and reading the date…`;
    form.reset();
    loadEntries();
    button.disabled = false;
  });

  loadEntries();
  setInterval(loadEntries, 4000); // reflect OCR/date results as they land
</script>
</body>
</html>
